<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b2e"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6272a4;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8be9fd;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#50fa7b;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="160" rx="10" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="520" height="160" rx="10" fill="none" stroke="#7070a0" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Digital waveform — left decoration -->
  <polyline
    points="22,98 22,62 38,62 38,98 54,98 54,62 62,62 62,78 70,78 70,62 90,62 90,98 106,98 106,62 118,62 118,98 130,98"
    fill="none" stroke="url(#waveGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Vertical divider -->
  <line x1="148" y1="32" x2="148" y2="128" stroke="#7070a0" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Prompt symbol -->
  <text x="168" y="72" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="18" fill="#6272a4" opacity="0.7">$</text>

  <!-- "lazy_" — white -->
  <text x="188" y="95" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="52" font-weight="bold" fill="#f8f8f2" letter-spacing="-1"
        filter="url(#subtleGlow)">lazy_</text>

  <!-- "vunit" — cyan accent -->
  <text x="355" y="95" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="52" font-weight="bold" fill="#8be9fd" letter-spacing="-1"
        filter="url(#glow)">vunit</text>

  <!-- Block cursor -->
  <rect x="500" y="50" width="11" height="46" rx="1" fill="#8be9fd" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.1;0.85" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="189" y="118" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="12" fill="#6272a4" letter-spacing="2">VUnit TUI  ·  terminal-first HDL simulation</text>

  <!-- Status icons bottom-right -->
  <text x="396" y="140" font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="11" fill="#50fa7b" opacity="0.7">✓ passed</text>
  <text x="456" y="140" font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="11" fill="#ff5555" opacity="0.7">  ✗ failed</text>
</svg>
